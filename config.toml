# Default agent-server configuration.
# Copy to ~/.agent/config.toml and edit as needed.
# Environment variable overrides are applied on top of this file (see config.rs).

[server]
host = "127.0.0.1"
port = 8080

[provider]
base_url = "http://localhost:8080/v1"
api_key = ""
model = "qwen2.5-coder-7b-instruct"
# enable_thinking = false  # disable thinking/reasoning (default: true)

[summary]
model = "qwen2.5-coder-1.5b-instruct"
# base_url and api_key default to [provider] values if omitted

[session]
soft_cap_pct = 65
hard_cap_pct = 85
max_tool_calls_per_turn = 25

[logging]
level = "info"
to_file = "/tmp/agent-server.log"
to_stderr = true

[sandbox]
enabled = true
# bwrap_path = "/usr/bin/bwrap"  # auto-detected if omitted

[sandbox.defaults]
hide = [
    "~/.ssh", "~/.aws", "~/.azure", "~/.config/gcloud", "~/.config/heroku",
    "~/.config/gh", "~/.config/glab", "~/.kube", "~/.docker",
    "~/.git-credentials", "~/.netrc",
    "~/.npmrc", "~/.pypirc", "~/.cargo/credentials.toml",
    "~/.gnupg", "~/.password-store",
    "~/.local/share/keyrings", "~/.config/keybase",
    "~/.bash_history", "~/.zsh_history", "~/.local/share/fish/fish_history",
    "~/.mozilla", "~/.config/google-chrome", "~/.config/chromium",
    "~/.config/Slack", "~/.config/discord",
]