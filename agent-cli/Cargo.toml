[package]
name = "agent-cli"
version = "0.1.0"
edition = "2021"

[dependencies]
agent-core    = { path = "../agent-core" }
ureq          = "3"
serde         = { version = "1", features = ["derive"] }
serde_json    = "1"
clap          = { version = "4", features = ["derive"] }
termion       = "4"
anyhow        = "1"
ctrlc         = "3.4"
